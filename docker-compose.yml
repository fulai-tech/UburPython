# 生产编排：nginx 反代 + UburNode + Elasticsearch（单节点）
# 镜像由 CI 推送到 GHCR；服务器 /opt/uburnode 放本文件与 .env

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: uburnode-nginx
    ports:
      - "8001:80"  # 宿主机 80 已被宝塔 nginx 占用
    volumes:
      - ./deploy/nginx/uburnode.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  app:
    image: ${UBURNODE_IMAGE:-ghcr.io/dwqnidq/uburnode:latest}
    container_name: uburnode-app
    env_file:
      - .env
    environment:
      ES_NODE: http://elasticsearch:9200
    volumes:
      - hf_cache:/data/huggingface
      - app_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 2560M
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: uburnode-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

volumes:
  es_data:
  hf_cache:
  app_logs:
