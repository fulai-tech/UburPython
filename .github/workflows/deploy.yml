name: Deploy UburNode

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dwqnidq/uburnode
  DEPLOY_DIR: /opt/uburnode

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy compose and nginx to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.yml,deploy,scripts/server_bootstrap.sh"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 600m
          envs: IMAGE_TAG,GHCR_TOKEN
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            if [ -f scripts/server_bootstrap.sh ]; then
              chmod +x scripts/server_bootstrap.sh
              UBURNODE_BOOTSTRAP_MARKER="$DEPLOY_DIR/.docker_bootstrapped" \
                bash scripts/server_bootstrap.sh
            fi
            if [ ! -f .env ]; then
              echo "缺少 $DEPLOY_DIR/.env，请从 .env.example 复制并填写后重试"
              exit 1
            fi
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi
            export UBURNODE_IMAGE=ghcr.io/dwqnidq/uburnode:${IMAGE_TAG}
            docker compose pull
            docker compose up -d
            docker compose ps
